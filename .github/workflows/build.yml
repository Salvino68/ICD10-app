name: Build BMASGPK XLSX

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyMuPDF openpyxl
      
      - name: Download and parse BMASGPK PDF
        run: python parse_bmasgpk.py
      
      - name: Check if XLSX was created
        run: |
          if [ -f DIAGLIST_2026.xlsx ]; then
            echo "✅ DIAGLIST_2026.xlsx created"
            ls -lh DIAGLIST_2026.xlsx
          else
            echo "⚠️  XLSX not created"
          fi
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add DIAGLIST_2026.xlsx
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update BMASGPK XLSX" && git push)
        continue-on-error: true
